<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Feedback</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(135deg, #1a1a1a, #2a003f);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: rgba(255,255,255,0.1);
            padding: 30px;
            border-radius: 15px;
            width: 350px;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border-radius: 8px;
            border: none;
            outline: none;
        }

        textarea {
            height: 100px;
        }

        button {
            width: 100%;
            margin-top: 15px;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(45deg, #ff7eb3, #ff758c);
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
        }

        .back {
            margin-top: 10px;
            text-align: center;
        }

        .back a {
            color: #00f2ff;
            text-decoration: none;
        }
    </style>
</head>

<body>

<div class="card">
    <h2>Give Feedback</h2>

    <form method="POST">
        {% csrf_token %}

        <input type="text" name="name" placeholder="Your Name" required>

        <textarea name="message" placeholder="Your Feedback" required></textarea>

        <button type="submit">Submit Feedback</button>
    </form>

    <div class="back">
        <a href="/">← Back to Home</a>
    </div>
</div>

</body>
</html>
